# Конфигурация сервиса распознавания лиц

server:
  host: "0.0.0.0"
  port: 8001

go2rtc:
  url: "http://go2rtc:1984"

crm:
  url: "http://host.docker.internal:3000"
  api_key: "${PRESENCE_SERVICE_API_KEY}"

recognition:
  # Минимальный порог уверенности (0.0 - 1.0)
  confidence_threshold: 0.6
  # Размер лица для обработки
  face_size: 112
  # Интервал между кадрами (секунды)
  frame_interval: 1.0
  # Максимальное количество лиц на кадре
  max_faces: 10

cameras:
  # Список камер загружается из CRM
  poll_interval: 60  # секунд
