services:
  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: merch-go2rtc
    restart: unless-stopped
    ports:
      - "1984:1984"
      - "8554:8554"
      - "8555:8555"
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
    environment:
      - TZ=Europe/Moscow
    networks:
      - app_network

  face-recognition:
    image: ghcr.io/${REPO_NAME:-merch-crm/merch-crm}-face-recognition:latest
    container_name: merch-face-recognition
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PRESENCE_SERVICE_API_KEY=${PRESENCE_SERVICE_API_KEY:-presence-secret-key}
      - GO2RTC_URL=http://go2rtc:1984
      - CRM_URL=http://merch-crm:3000
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - face-models:/app/models
    depends_on:
      - go2rtc
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - app_network

volumes:
  face-models:


networks:
  app_network:
    external: true
